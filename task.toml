artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Line-oriented parsing of a small access log with basic counting and a most-frequent (mode) computation."
solution_explanation = "Read /app/access.log, count request lines and distinct client IPs, pick the most frequent request path, and write the result as JSON to /app/report.json."
verification_explanation = "Parse /app/report.json and assert total_requests, unique_ips, and top_path equal the values computed from the fixed access log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
